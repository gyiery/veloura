{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Veloura</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<section class="lux-dashboard-shell">
    <aside class="lux-dashboard-sidebar">
        <div class="lux-dashboard-brand">
            <span class="lux-brand-dot"></span>
            <div>
                <h2>Veloura</h2>
                <p>Admin Suite</p>
            </div>
        </div>

        <nav class="lux-dashboard-menu">
            <a href="{% url 'dashboard_overview' %}">Overview</a>
            <a href="{% url 'dashboard_products' %}" class="active">Products</a>
            <a href="{% url 'dashboard_orders' %}">Orders</a>
            <a href="{% url 'dashboard_coupons' %}">Coupons</a>
            <a href="{% url 'dashboard_order_requests' %}">Returns / Cancels</a>
            <a href="{% url 'dashboard_reviews' %}">Reviews</a>
            <a href="/">Back to Website</a>
        </nav>
    </aside>

    <main class="lux-dashboard-content">
        <div class="lux-dashboard-header">
            <div>
                <p class="lux-dashboard-kicker">Inventory Control</p>
                <h1>Add Product</h1>
            </div>
        </div>

        <div class="lux-form-card">
            <form method="post" enctype="multipart/form-data" class="lux-form-grid">
                {% csrf_token %}

                <input type="text" name="name" placeholder="Product Name" required>

                <select name="category" required>
                    <option value="">Select Category</option>
                    <option value="Women">Women</option>
                    <option value="Men">Men</option>
                    <option value="Kids">Kids</option>
                    <option value="Home">Accessories</option>
                    <option value="Perfume">Perfume</option>
                </select>

                <select name="gender">
                    <option value="">Select Gender (Accessories only)</option>
                    <option value="Men">Men</option>
                    <option value="Women">Women</option>
                </select>

                <select name="accessory_type">
                    <option value="">Select Accessories Type</option>
                    <option value="Shoes">Shoes</option>
                    <option value="Watches">Watches</option>
                    <option value="Glasses">Glasses</option>
                    <option value="Belts">Belts</option>
                    <option value="Wallets">Wallets</option>
                    <option value="Purse">Purse</option>
                    <option value="Jewellery">Jewellery</option>
                    <option value="Skin-Care">Skin-Care</option>
                </select>

                <select name="subcategory">
                    <option value="">Select Subcategory</option>
                    <option value="Shirts">Shirts</option>
                    <option value="T-Shirts">T-Shirts</option>
                    <option value="Jeans">Jeans</option>
                    <option value="Formal">Formal</option>
                    <option value="Polos">Polos</option>
                    <option value="Jackets">Jackets</option>
                    <option value="Trousers">Trousers</option>
                    <option value="Dresses">Dresses</option>
                    <option value="Tops">Tops</option>
                    <option value="Kurtas">Kurtas</option>
                    <option value="Sarees">Sarees</option>
                    <option value="Skirts">Skirts</option>
                    <option value="Co-ords">Co-ords</option>
                    <option value="Leggings">Leggings</option>
                    <option value="Boys Wear">Boys Wear</option>
                    <option value="Girls Wear">Girls Wear</option>
                    <option value="Sets">Sets</option>
                    <option value="Nightwear">Nightwear</option>
                    <option value="Baby Wear">Baby Wear</option>
                </select>

                <input type="number" step="0.01" name="price" placeholder="Price" required>
                <input type="file" name="image" required>
                <input type="number" name="stock" placeholder="Stock Quantity" min="0" required>

                <div class="dashboard-form-group">
    <label>Sale Percent</label>
    <input type="number" name="sale_percent" min="0" max="90" value="0">
</div>

<div class="dashboard-form-group full-span">
    <label>
        <input type="checkbox" name="is_on_sale">
        Put this product on Sale
    </label>
</div>

                <textarea name="description" rows="6" placeholder="Description" required></textarea>

                <label class="lux-check">
                    <input type="checkbox" name="is_new_arrival">
                    <span>New Arrival</span>
                </label>

                <label class="lux-check">
                    <input type="checkbox" name="is_best_seller">
                    <span>Best Seller</span>
                </label>

                <button type="submit" class="lux-main-btn full-width-btn">Save Product</button>
            </form>
        </div>
    </main>
</section>

</body>
</html>
