{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Veloura</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<section class="lux-dashboard-shell">
    <aside class="lux-dashboard-sidebar">
        <div class="lux-dashboard-brand">
            <span class="lux-brand-dot"></span>
            <div>
                <h2>Veloura</h2>
                <p>Admin Suite</p>
            </div>
        </div>

        <nav class="lux-dashboard-menu">
            <a href="{% url 'dashboard_overview' %}">Overview</a>
            <a href="{% url 'dashboard_products' %}" class="active">Products</a>
            <a href="{% url 'dashboard_orders' %}">Orders</a>
            <a href="{% url 'dashboard_coupons' %}">Coupons</a>
            <a href="{% url 'dashboard_order_requests' %}">Returns / Cancels</a>
            <a href="{% url 'dashboard_reviews' %}">Reviews</a>
            <a href="/">Back to Website</a>
        </nav>
    </aside>

    <main class="lux-dashboard-content">
        <div class="lux-dashboard-header">
            <div>
                <p class="lux-dashboard-kicker">Inventory Control</p>
                <h1>Edit Product</h1>
            </div>
        </div>

        <div class="lux-form-card">
            <form method="post" enctype="multipart/form-data" class="lux-form-grid">
                {% csrf_token %}

                <input type="text" name="name" value="{{ product.name }}" required>

                <select name="category" required>
                    <option value="Women" {% if product.category == "Women" %}selected{% endif %}>Women</option>
                    <option value="Men" {% if product.category == "Men" %}selected{% endif %}>Men</option>
                    <option value="Kids" {% if product.category == "Kids" %}selected{% endif %}>Kids</option>
                    <option value="Home" {% if product.category == "Home" %}selected{% endif %}>Accessories</option>
                    <option value="Perfume" {% if product.category == "Perfume" %}selected{% endif %}>Perfume</option>
                </select>

                <select name="gender">
                    <option value="">Select Gender (Accessories only)</option>
                    <option value="Men" {% if product.gender == "Men" %}selected{% endif %}>Men</option>
                    <option value="Women" {% if product.gender == "Women" %}selected{% endif %}>Women</option>
                </select>

                <select name="accessory_type">
                    <option value="">Select Accessories Type</option>
                    <option value="Shoes" {% if product.accessory_type == "Shoes" %}selected{% endif %}>Shoes</option>
                    <option value="Watches" {% if product.accessory_type == "Watches" %}selected{% endif %}>Watches</option>
                    <option value="Glasses" {% if product.accessory_type == "Glasses" %}selected{% endif %}>Glasses</option>
                    <option value="Belts" {% if product.accessory_type == "Belts" %}selected{% endif %}>Belts</option>
                    <option value="Wallets" {% if product.accessory_type == "Wallets" %}selected{% endif %}>Wallets</option>
                    <option value="Purse" {% if product.accessory_type == "Purse" %}selected{% endif %}>Purse</option>
                    <option value="Jewellery" {% if product.accessory_type == "Jewellery" %}selected{% endif %}>Jewellery</option>
                    <option value="Skin-Care" {% if product.accessory_type == "Skin-Care" %}selected{% endif %}>Skin-Care</option>
                </select>

                <select name="subcategory">
                    <option value="">Select Subcategory</option>
                    <option value="Shirts" {% if product.subcategory == "Shirts" %}selected{% endif %}>Shirts</option>
                    <option value="T-Shirts" {% if product.subcategory == "T-Shirts" %}selected{% endif %}>T-Shirts</option>
                    <option value="Jeans" {% if product.subcategory == "Jeans" %}selected{% endif %}>Jeans</option>
                    <option value="Formal" {% if product.subcategory == "Formal" %}selected{% endif %}>Formal</option>
                    <option value="Polos" {% if product.subcategory == "Polos" %}selected{% endif %}>Polos</option>
                    <option value="Jackets" {% if product.subcategory == "Jackets" %}selected{% endif %}>Jackets</option>
                    <option value="Trousers" {% if product.subcategory == "Trousers" %}selected{% endif %}>Trousers</option>
                    <option value="Dresses" {% if product.subcategory == "Dresses" %}selected{% endif %}>Dresses</option>
                    <option value="Tops" {% if product.subcategory == "Tops" %}selected{% endif %}>Tops</option>
                    <option value="Kurtas" {% if product.subcategory == "Kurtas" %}selected{% endif %}>Kurtas</option>
                    <option value="Sarees" {% if product.subcategory == "Sarees" %}selected{% endif %}>Sarees</option>
                    <option value="Skirts" {% if product.subcategory == "Skirts" %}selected{% endif %}>Skirts</option>
                    <option value="Co-ords" {% if product.subcategory == "Co-ords" %}selected{% endif %}>Co-ords</option>
                    <option value="Leggings" {% if product.subcategory == "Leggings" %}selected{% endif %}>Leggings</option>
                    <option value="Boys Wear" {% if product.subcategory == "Boys Wear" %}selected{% endif %}>Boys Wear</option>
                    <option value="Girls Wear" {% if product.subcategory == "Girls Wear" %}selected{% endif %}>Girls Wear</option>
                    <option value="Sets" {% if product.subcategory == "Sets" %}selected{% endif %}>Sets</option>
                    <option value="Nightwear" {% if product.subcategory == "Nightwear" %}selected{% endif %}>Nightwear</option>
                    <option value="Baby Wear" {% if product.subcategory == "Baby Wear" %}selected{% endif %}>Baby Wear</option>
                </select>

                <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
                <input type="file" name="image">
                <input type="number" name="stock" value="{{ product.stock }}" min="0" required>

                <div class="dashboard-form-group">
    <label>Sale Percent</label>
    <input type="number" name="sale_percent" min="0" max="90" value="{{ product.sale_percent }}">
</div>

<div class="dashboard-form-group full-span">
    <label>
        <input type="checkbox" name="is_on_sale" {% if product.is_on_sale %}checked{% endif %}>
        Put this product on Sale
    </label>
</div>

                <textarea name="description" rows="6" required>{{ product.description }}</textarea>

                <label class="lux-check">
                    <input type="checkbox" name="is_new_arrival" {% if product.is_new_arrival %}checked{% endif %}>
                    <span>New Arrival</span>
                </label>

                <label class="lux-check">
                    <input type="checkbox" name="is_best_seller" {% if product.is_best_seller %}checked{% endif %}>
                    <span>Best Seller</span>
                </label>

                <button type="submit" class="lux-main-btn full-width-btn">Update Product</button>
            </form>
        </div>
    </main>
</section>

</body>
</html>
